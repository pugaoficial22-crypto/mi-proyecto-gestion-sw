name: CI Pipeline - Análisis SAST con SonarQube

on:
  push:
    branches:
      - main

jobs:
  sonarQube-analysis:
    name: Análisis de Calidad de Código
    runs-on: ubuntu-latest

    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Agregar certificado ngrok y ejecutar SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          HOST=$(echo $SONAR_HOST_URL | sed 's|https://||')
          echo | openssl s_client -connect ${HOST}:443 2>/dev/null | openssl x509 > ngrok-cert.pem
          sudo keytool -import -noprompt -alias ngrok -keystore $JAVA_HOME/lib/security/cacerts -storepass changeit -file ngrok-cert.pem
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-3.3.0.1492-linux.zip
          unzip -q sonar-scanner-cli-3.3.0.1492-linux.zip
          export SONAR_SCANNER_OPTS="-Djavax.net.ssl.trustStore=$JAVA_HOME/lib/security/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
          export JAVA_HOME=$JAVA_HOME
          sonar-scanner-3.3.0.1492-linux/bin/sonar-scanner \
            -Dsonar.projectKey=mi-proyecto-gestion-sw \
            -Dsonar.sources=src \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.sourceEncoding=UTF-8
